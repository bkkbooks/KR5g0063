front:
  text: 雷法議玄篇席八
  hash: sha256:dedcff5044d97b62558bdeb16e83e9d4b104147754a60888317e1415004a5f86
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0063_HFL_000-001a, image: hfl/0997/0997-180.png}
body:
  text: 元盧真人萬宗師撰余昔遇度師於龍山之上秀水之濱得聞混元太一之道五雷禦邪之文總局二十四部分上中下三卷其間符圖印訣密呪符式約二百餘篇飛罡躡斗結印掐文奚可具其品目三復之竟遂告師曰此所謂法海淵源也伏聞至道不繁至法最簡今此靈文雖秃干毫未能盡録耳師曰子可盟天立誓方授子捷妙之法弟子告曰倘蒙師慈授我以元玄之奧微妙之機即割肉為香剪髮為誓何可憚歟果真師於囊隱之中出視一小册對天盟授其間符印呪訣不出三十餘章法式罡訣皆可心記師曰至玄至簡妙在斯文且夫天上三十六者子得聞乎以至道言之乾元真一之數乾者陽也是丹靈真一之氣元始布化之初彌羅凝結渺漠難窮或為軒為蓋為闕為宫以三十六氣而為天天為萬物之祖故天與之形道與之貌況修真之士欲求長生不死與天齊年非得三十六氣之妙豈可與道合真而驅龍掣電者哉豫聞此言方明道之造化法之斡旋其理歸一揆耳至於二十八宿列於四維真皇大帝羅布黃庭內座帝宫合六六之數故中斗大魁總監衆靈是也輔佐天皇至化掌持劫運總覽要權其中靈官將吏列職分司稟聽真皇號令而行且如箕星主風璧星主雨昴星主晴虛星危星主雪軫宿主雷其風晴雨雪雹電霹靂各有所主威星大耀猛將毒雷皆居三十六梵氣之中悉在一七九星之下此星乃衆星總領大梵之要權威烈當先何神不伏雷神雖猛咸聽令行與夫諸星大曜捷將猛神隨氣斡旋晝夜不息蓋行之有度止之有方不知方度何為克應自非洞達幽冥之士識該天機至奧之人豈能知威星大曜行止者乎且甲乙日午時祈雨其璧星居止何方縱知方位分明不知以何勑驅役邪故兵家遁甲論曰先明太一真數以觀星曜吉凶之象臨陳之間必以開休生門以要道如丙丁日未時行軍其開休生在於何方悟之者決勝千里迷之者寸步難移如陰陽風水之士選年月修造高人知吉凶則無災無咎察善曜則有禧有祥此者密識星機通神妙用如斯知奧總歸一掌之中豈在虛侈繁文矣故我師王公侍宸之掌中風雨曾動明君此非掌中之妙何言此也蓋屢取效歟大抵行持之士須明陰陽星殺合氣衝擊當先究聞上帝親機元皇玉札方能效應是以雷機至化冠于古今歷代謫仙但口口相傳亦不能記文字而已所以太上祕訣云披髮步罡尋煞氣劒尖燃火爇真文此謂真文也乃真王上帝於溟涬未分之前在飛玄真境之上布梵氣於碧霄紫漢之間結成龍章鳳篆光映十方震動六合即命天皇真人依規按筆乃書成章元始上帝於龍陽明宫授付真王其餘結賜龍宫海藏永鎮寰宇所謂法旨不知幾階惟雷居其捷焉但後學之士心高氣鋭行短言輕雖遇真師孰能究其玄妙故掌中機要不曾聞劒上真文未嘗見蓋功微效寡觸事不靈中道而廢怨道咎師者多矣乃是錯授斯法悮我後學殊不思參究法源未徹不過真師付度具世傳欻火真形雷公真相乖訛萬狀繁亂元真不惟無效於目前抑且貽笑於人神與夫木郎大呪法家得其全備者亦妙爾縱得其備將此法篆如何造化符中祕要又未明機首一句乾天曜輝玉池東此一句書在雷公頂踵之間下筆如何安篆至於雷公聖像欻火真形跨龍坐下執槌手中句句造化字字分明生成有格其餘符篆大槩如斯且立壇祈雨如龍潭相去法壇百里之遠必用倒海符親詣投之縱有靈驗己落第二機矣如我真師則不然先於玄壇之上以一符召功曹功曹至捧一符召某處雷公雷公至持一符召某處龍神龍神至則風生雲合電掣雷轟依法使之立喝雨至此法皆曰至妙我師猶謂此為繁文未為目前應驗吾遇祈雨之際止書一符于鐵簡之上擊投於畢宿之方論訣飛罡一喝兩至可謂至玄至妙自下令擊伐邪廟之法應在須臾我師條曰凡遇崇纍害生命罪當誅伐先於掌中尋金虎大煞流火凶星在二十四位之中今月今日今時落在何處指方既定以雷火符激之彼星屬金此符屬火金火相尅應時辟伐繼即邪廟破矣嗚呼天寶玄誥琳琅祕文苟非異士親傳真師口訣將見皓首窮終無所得且如尋常起雷之士必須先奏上帝次取報應然後方行大抵驅邪治病馘毒除妖正謂如救頭燃若待上帝勑下何如和聲求援緩步救焚豈可立待己故真王垂教云雷霆玉府乃五雷部轄也奉上帝命賞善罰惡便宜行事故我師王君太素得真王便宜行事之要非其靈骨之人豈能遇也又非猛烈忠孝之者孰能持也且持法之一端實修真之捷徑非神全者豈能驅策鬼神以救沉痾是故祖師以元一之真氣化無量大將軍滅六天魔鬼積功纍行上朝金闕故行持之士不造妙旨形還壞滅不積陰功難達玄境不煉精華神不清悅不濟疾苦道果難成凡欲求仙學道之者不出乎為國救民興利除害正直聰明精勤香火禳九玄七祖之罪釋千劫百世之愆夙緣有幸得遇師友毋背盟言飛升可待輒犯玄律苦海沉淪精心行之其應如響後學之士毋耳忽諸雷法淵海正演數夫古者行持之士以心感物以正禦邪心正則百神效靈身正則萬邪遁迹去古逾遠降本流末遂立教法以禦鬼用符術以感神為雷之為物乃上天之號令合二氣之陰陽復則靜豫則奮生於軫宿起於巽户非時不發有神攸司而道家者流有以法行雷者有以法借雷者殆不幾為驚世駭俗之論乎今夫正演之説果何自而立邪吁我知之矣正心誠意與天為徒淵深莫測忽兮若海恢弘正道流演無窮然此未造玄元之妙達微妙之機未足以語此也今有人焉久參上法普濟下民遇度師傳至當之理代上天行真教之風得古人正心神會之旨趣加以飛罡躡斗結印掐文心香一焚心符一爇號令之鳴萬神聽命會捷雷宿之方窮弄雨師之柄一檄雷轟一喝雨至此喝彼隨其應響回視行雷泛泛之士不究斡旋之妙不知感召之由每窮古人之粳粃妄談吾道之淵微言與行違心與物汨瞪眉竪目虛喝張惶欲望報應寂然無聞者相去蓋千萬里也若乃火師汪若谷得真王便宜行事叱吒雷霆號令風雨處統真機內全太素以齋戒事上帝以至誠感鬼神號令精明賞罰必信動容周旋默與道會佐天行化輔國救民子謂無愧矣今欲發揮正演之化必先傳授正演之文非徒目前之美觀將為後學之矜式僕不敢自祕用工鋟梓以廣其傳願我同志毋耳忽諸時宋淳祐八年二月真元節谷隱作以法行雷舉世皆是然得傳識其奧者或寡矣且夫正演之作豈淺淺者所能哉然匪徒其能言之又且能用之此豫不緘也敬述以贊補於將來非小補哉大朴未散陰陽以萌兩儀既奠八卦乃成維震維巽主風主霆繇水而化觸火而明自復而壯俾枯者榮上驅天號下付物形孰司此柄以時而鳴出乎地户達于帝庭樞臺主轄梵氣結成一九而三數肇玉淸皆隸神霄具載禹經以法而運其無匪輕粵然古者相承逮今惟詞至玄可復幽冥世降俗薄偽私始生自稱宗壇妄攝仙卿問其行事亡實其名以訛受訛召將役兵所謂微妙如聾聽聲間有知者他心營營天恐斯道湮沒欲傾俾續其傳純白田君深悟其詮默修黃庭先覺之徒後進之英紫皇祕訣得以直行洞究原本弗徇利名濟俗為念持習研精俯按五方仰參列星宏綱要括斡旋不停祈晴響應考治患寧不肯獨善誘掖同盟著作正演可想達靈運雷之法豁開愚盲當與王薛班列瑶京能求旨趣虛者必盈余觀其文三歎甚驚敘其辦洽譽豈至情補於將來百世芳馨與法偕流如丹如青言不盡意讃而勒銘玉霄吟贈識庵先生玉霄一派何人曉元機隱奧難尋討妙法心傳存幾階八乘學士知音少赤天都雷隸真王欻火大將居舍房丑未二宫些兒妙未牛二將侍師傍此法流傳世罕知天恐斯道將傾摧玉府謫仙鄺真士親付何君造化機何君既明闡大法不離周天一十八祈晴禱雨應聲生收拾歸來玩明月坐令滿室光輝生元珠直透公崑崙中有嬰兒握神化駕箇火龍謁帝君欻火真形詳論宗師玄虛萬君議玄篇曰世傳欻火真形雷公丹篆實為乖訛萬狀繁亂無規不惟無效於目前深有取笑於神鬼如木郎大呪法家得其全備亦妙矣縱得其備將此呪以何為造化首句曰乾晶流輝玉池東此一句於雷公頂踵之間下筆生成何為雷公聖相欻火真形以致跨龍座下執鎚手中句句造化分明字字生成有袼其他真篆大槩如斯云云余從冠年因觀議玄篇之奧論遂孜孜參訪苦志尋求雖纍蒙師友指教終未合先賢之宗旨余於癸丑寓金陵忽有異遇乃元豐年間宗師曾君之祕典也其家藏三世不敢妄動或誤拂其塵則災絆隨至蓋有所待而然也余受之焚香開卷首言欻火真形雷公聖相生成變化之道平生所疑頓然氷釋行之果有奇驗後授一二嗣法皆未得人余今將老矣不傳恐祕天道傳之則難於擇人詳論之書既成併露真機一二以示將來庶可尋流知源免湮沉於祕典也凡欲行持先服先天祖氣點化一身凡胎之氣蓋此先天祖氣乃鴻濛大道之根當於混沌未分已前求之萬法千門皆始於此也即非父母媾精己後穢濁之氣前篇詳論之矣既得祖氣入身點化凡濁然後可以行持凡書符先推生旺次入靖室勑召雷霆萬神屯駐充塞宇宙自然天昏地黑二氣升降方乃藏形變體五氣相生一生一而聖胎結就行十轉回靈之上道合九天生神之玄機次布祖氣於三景太空之中生玄牝於先天真土之位運命元玄一黃演之氣九重纒其胞命解結回根次運命元洞冥紫户之氣九重纒其胎命次運命元長靈明仙之氣九重纒其魂命次運命元碭尸冥演由之氣九重纒其魄命次運命元五仙中靈之氣九重纒其臟腑次運命元高真沖融之氣九重纒其靈府次運命元高仙洞笈之氣九重纒其元府次運命元真靈化凝之氣九重纒其華府次運命元自然玄照之氣九重纒其嶽府以成九九八十一數生成五臟六腑三關九宫百神內備運乾晶於兩目下筆曰乾晶流輝玉池東鼻為山嶽故曰木郎太一三山雄手執斧曰金鎚玉斧爍天宫一手執雷鑽故曰霹靂破石泉源通書兩足欲其廣運神力憾山捲海升降陰陽故曰閼伯撼動崑崙峯幽靈翻海玄冥同書其爪欲鋭故曰黃利持劒斬螭䗤然後召起天雷神雷龍雷水雷社令雷鼓動奮發而為兩翅故曰雙搏飛行遊太空書圓光欲先鋒照耀則曰太一捷疾先禦凶圓光烜嚇洞燭聖容故曰朱髮巨翅雙目彤圓光之上書三昧火光則曰雷光迸空烈火紅與夫座下飛龍竅妙亦然自頭至尾句句深有造化且如四足則召起五嶽及四令蠻雷先天五將等分布真威以佐先鋒豈可以小小符籙淺淺造化同日而語哉書符既成即運真水真火脫胎化生分形變化攝入符中即見火神奮翅神龍哮吼飛騰宇宙翻動海嶽一切雷神悉皆隨從便宜治事余當卓劒壇前斡運造化催督號令須臾則風生雲合電掣雷轟甘雨降隨若行祈晴禱雪馘崇降魔種種行持皆不可缺此聖相真符乃先天大法中之玄機骨也木郎大呪共有九十七句造化句句分明若得其妙則諸家雷法皆可役用何所往而不可也學者深研之太極雷壇祭四維神法五月五日用黃羅一尺二寸如法寫下赤雞紫鵝符焚香誦木郎呪百遍將符沉東北水中次歸淨室設四位血食供養酌酒召玉雷皓師等四神獻酒即見雞鵝之形次又見神形任意所禱化紙旱涸之年有禱即應五雷經云此四神乃太初混芒之時水精也禹王治水令鎮四維亦云八卦之精主雲雨年年祀之可立致雲雨念木郎呪書赤雞紫鵝符玉雷皓師君乃東南之神人首龜身春洞陽幽靈君乃東北之神人首蛇身夏虛皇太華君乃西北之神人首魚身冬火光流精君乃西南之神人首龍身秋東海神阿明南海神祝融西海神巨乘北海神愚強雷法議玄篇
